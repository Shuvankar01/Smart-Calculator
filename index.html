<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Smart Calculator Pro</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
</head>

<body>

<div class="calculator">

<h2>Smart Calculator</h2>

<!-- Display -->
<input type="text" id="display" placeholder="0" readonly>
<button id="installBtn" style="display:none;">📲 Install App</button>

<!-- Top Controls -->
<div class="top-controls">

<button onclick="toggleTheme()">🌙</button>
<button onclick="copyResult()">📋</button>
<button onclick="downloadHistory()">⬇</button>


</div>

<!-- Memory Buttons -->
<div class="memory">

<button onclick="memoryClear()">MC</button>
<button onclick="memoryRecall()">MR</button>
<button onclick="memoryAdd()">M+</button>
<button onclick="memorySubtract()">M-</button>
<button onclick="startVoice()">🎤 Voice</button>

</div>

<!-- Main Calculator Buttons -->
<div class="buttons">

<button onclick="clearDisplay()">C</button>
<button onclick="deleteLast()">DEL</button>
<button onclick="append('%')">%</button>
<button onclick="append('/')">÷</button>

<button onclick="append('7')">7</button>
<button onclick="append('8')">8</button>
<button onclick="append('9')">9</button>
<button onclick="append('*')">×</button>

<button onclick="append('4')">4</button>
<button onclick="append('5')">5</button>
<button onclick="append('6')">6</button>
<button onclick="append('-')">−</button>

<button onclick="append('1')">1</button>
<button onclick="append('2')">2</button>
<button onclick="append('3')">3</button>
<button onclick="append('+')">+</button>

<button onclick="append('0')">0</button>
<button onclick="append('.')">.</button>
<button class="equal" onclick="calculate()">=</button>

</div>

<!-- Scientific Mode Toggle -->
<button class="sci-toggle" onclick="toggleScientific()">
Scientific Mode
</button>

<!-- Scientific Buttons -->
<div id="scientific" class="scientific">

<button onclick="sin()">sin</button>
<button onclick="cos()">cos</button>
<button onclick="tan()">tan</button>

<button onclick="square()">x²</button>
<button onclick="sqrt()">√</button>
<button onclick="log()">log</button>

</div>

<!-- History Section -->
<div class="history-section">

<h3>History</h3>

<button class="clear-history" onclick="clearHistory()">
Clear History
</button>

<ul id="history"></ul>

</div>

</div>
<script src="script.js?v=5"></script>

</body>
</html>
